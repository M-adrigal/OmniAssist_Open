<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - OmniAssist</title>
<link rel="icon" href="/favicon.ico">
  <style>
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f7f7f8;
      --text-primary: #1a1a2e;
      --text-secondary: #6b6b80;
      --text-muted: #9a9ab0;
      --accent: #1976d2;
      --accent-hover: #1565c0;
      --danger: #ef5350;
      --border: #e0e0e8;
      --radius: 8px;
      --radius-lg: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
      --transition: 0.2s ease;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.8s ease;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 30%, rgba(59, 130, 246, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 70%, rgba(139, 92, 246, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 50% 50%, rgba(16, 185, 129, 0.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      transition: opacity 0.8s ease;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 15% 25%, rgba(59, 130, 246, 0.12) 0%, transparent 35%),
        radial-gradient(circle at 85% 75%, rgba(139, 92, 246, 0.10) 0%, transparent 35%),
        radial-gradient(circle at 50% 50%, rgba(16, 185, 129, 0.06) 0%, transparent 40%),
        radial-gradient(circle at 30% 80%, rgba(245, 158, 11, 0.07) 0%, transparent 30%),
        radial-gradient(circle at 70% 20%, rgba(236, 72, 153, 0.06) 0%, transparent 30%);
      pointer-events: none;
      z-index: 0;
      transition: opacity 0.8s ease;
    }

    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(60px);
      pointer-events: none;
      z-index: 0;
      animation: orbFloat 12s ease-in-out infinite;
    }

    .bg-orb:nth-child(1) {
      width: 300px; height: 300px;
      background: rgba(59, 130, 246, 0.10);
      top: -10%; left: -5%;
      animation-delay: 0s;
      animation-duration: 14s;
    }

    .bg-orb:nth-child(2) {
      width: 250px; height: 250px;
      background: rgba(139, 92, 246, 0.09);
      bottom: -8%; right: -5%;
      animation-delay: -4s;
      animation-duration: 16s;
    }

    .bg-orb:nth-child(3) {
      width: 200px; height: 200px;
      background: rgba(16, 185, 129, 0.07);
      top: 50%; left: 60%;
      animation-delay: -8s;
      animation-duration: 18s;
    }

    .bg-orb:nth-child(4) {
      width: 180px; height: 180px;
      background: rgba(245, 158, 11, 0.06);
      top: 20%; right: 30%;
      animation-delay: -6s;
      animation-duration: 15s;
    }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(30px, -20px) scale(1.1); }
      50% { transform: translate(-15px, 25px) scale(0.95); }
      75% { transform: translate(-25px, -15px) scale(1.05); }
    }

    body.time-morning {
      background: linear-gradient(160deg, #fdfbfb 0%, #f5f0e8 30%, #ebedee 100%);
    }

    body.time-afternoon {
      background: linear-gradient(160deg, #e8f0fe 0%, #d4e4fc 40%, #c2e9fb 100%);
    }

    body.time-evening {
      background: linear-gradient(160deg, #fdf2e9 0%, #f5e0c8 30%, #e8d5c4 100%);
    }

    body.time-night {
      background: linear-gradient(160deg, #0f0f23 0%, #1a1a2e 40%, #16213e 100%);
    }

    .dark body.time-morning {
      background: linear-gradient(160deg, #1a1512 0%, #1f1a18 30%, #1a1a2e 100%);
    }

    .dark body.time-afternoon {
      background: linear-gradient(160deg, #0d1b2a 0%, #122438 40%, #1a2332 100%);
    }

    .dark body.time-evening {
      background: linear-gradient(160deg, #1a1010 0%, #1f1515 30%, #1a1a2e 100%);
    }

    .dark body.time-night {
      background: linear-gradient(160deg, #050510 0%, #0a0a1a 40%, #0d0d2b 100%);
    }

    .login-container {
      display: flex;
      width: 780px;
      min-height: 460px;
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.1), 0 1px 3px rgba(0,0,0,0.06);
      overflow: hidden;
      position: relative;
      z-index: 1;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .login-illustration {
      flex: 1;
      background: linear-gradient(135deg, rgba(227, 242, 253, 0.65) 0%, rgba(187, 222, 251, 0.55) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      transition: background 0.8s ease;
    }

    .login-illustration.time-morning {
      background: linear-gradient(135deg, rgba(255, 236, 210, 0.65) 0%, rgba(252, 182, 159, 0.55) 40%, rgba(248, 205, 218, 0.50) 100%);
    }

    .login-illustration.time-afternoon {
      background: linear-gradient(135deg, rgba(161, 196, 253, 0.60) 0%, rgba(194, 233, 251, 0.55) 100%);
    }

    .login-illustration.time-evening {
      background: linear-gradient(135deg, rgba(246, 211, 101, 0.60) 0%, rgba(253, 160, 133, 0.55) 60%, rgba(244, 59, 71, 0.45) 100%);
    }

    .login-illustration.time-night {
      background: linear-gradient(135deg, rgba(26, 26, 46, 0.70) 0%, rgba(22, 33, 62, 0.65) 50%, rgba(15, 52, 96, 0.55) 100%);
    }

    .login-illustration svg {
      width: 180px;
      height: 180px;
      margin-bottom: 24px;
    }

    .login-illustration h2 {
      font-size: 20px;
      font-weight: 700;
      color: #1565c0;
      margin-bottom: 8px;
    }

    .login-illustration p {
      font-size: 14px;
      color: #1976d2;
      text-align: center;
      line-height: 1.6;
    }

    .login-form {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 48px 40px;
    }

    .login-form h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .login-form .subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 10px 14px;
      font-size: 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-secondary);
      color: var(--text-primary);
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(25, 118, 210, 0.12);
    }

    .btn-login {
      width: 100%;
      padding: 11px 0;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background var(--transition);
      margin-top: 8px;
    }

    .btn-login:hover { background: var(--accent-hover); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

    .error-msg {
      font-size: 13px;
      color: var(--danger);
      margin-top: 12px;
      text-align: center;
      min-height: 20px;
    }

    .dark .login-container {
      background: rgba(26, 26, 26, 0.78);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 1px 3px rgba(255,255,255,0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .dark .login-form h1 {
      color: #ffffff;
    }

    .dark .login-form .subtitle {
      color: #888888;
    }

    .dark .form-group label {
      color: #aaaaaa;
    }

    .dark .form-group input {
      background: #2a2a2a;
      border-color: #333333;
      color: #ffffff;
    }

    .dark .form-group input:focus {
      border-color: #4a90d9;
      box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.2);
    }

    .dark .login-illustration h2 {
      color: #ffffff;
    }

    .dark .login-illustration p {
      color: #cccccc;
    }

    .dark .time-night .login-illustration h2,
    .dark .time-night .login-illustration p {
      color: #ffffff;
    }

    @media (max-width: 800px) {
      .login-container {
        flex-direction: column;
        width: 90vw;
        min-height: auto;
      }
      .login-illustration { padding: 32px 24px; }
      .login-illustration svg { width: 100px; height: 100px; }
      .login-form { padding: 32px 24px; }
    }
  </style>
</head>
<body>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="login-container">
    <div class="login-illustration">
      <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="login-grad" x1="0" y1="0" x2="200" y2="200">
            <stop offset="0%" stop-color="#3B82F6"/>
            <stop offset="100%" stop-color="#8B5CF6"/>
          </linearGradient>
        </defs>
        <rect x="50" y="30" width="100" height="100" rx="24" fill="url(#login-grad)" opacity="0.9"/>
        <text x="100" y="92" text-anchor="middle" fill="white" font-size="36" font-weight="800" font-family="sans-serif">OA</text>
        <circle cx="100" cy="160" r="4" fill="#3B82F6" opacity="0.4"/>
        <circle cx="80" cy="170" r="3" fill="#8B5CF6" opacity="0.3"/>
        <circle cx="120" cy="170" r="3" fill="#8B5CF6" opacity="0.3"/>
        <circle cx="100" cy="180" r="2" fill="#3B82F6" opacity="0.2"/>
      </svg>
      <h2>OmniAssist</h2>
      <p>计时算文查网，一站式全能辅助</p>
    </div>
    <div class="login-form">
      <h1 id="greeting">欢迎回来</h1>
      <p class="subtitle">请登录以继续使用服务</p>
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="username" placeholder="请输入用户名" autocomplete="username">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password">
      </div>
      <button class="btn-login" id="btn-login" onclick="handleLogin()">登 录</button>
      <div class="error-msg" id="error-msg"></div>
    </div>
  </div>

  <script>
    (function() {
      const hour = new Date().getHours();
      const greetingEl = document.getElementById('greeting');
      const illustEl = document.querySelector('.login-illustration');

      let timeClass = '';
      if (hour >= 5 && hour < 11) {
        greetingEl.textContent = '早上好，欢迎回来';
        timeClass = 'time-morning';
      } else if (hour >= 11 && hour < 17) {
        greetingEl.textContent = '下午好，欢迎回来';
        timeClass = 'time-afternoon';
      } else if (hour >= 17 && hour < 20) {
        greetingEl.textContent = '傍晚好，欢迎回来';
        timeClass = 'time-evening';
      } else {
        greetingEl.textContent = '晚上好，欢迎回来';
        timeClass = 'time-night';
      }
      illustEl.classList.add(timeClass);
      document.body.classList.add(timeClass);

      function applyTheme() {
        const saved = localStorage.getItem('theme');
        if (saved === 'dark') {
          document.documentElement.classList.add('dark');
        } else if (saved === 'light') {
          document.documentElement.classList.remove('dark');
        } else {
          if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
          }
        }
      }
      applyTheme();

      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
        const saved = localStorage.getItem('theme');
        if (!saved || saved === 'auto') applyTheme();
      });
    })();

    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const errorMsg = document.getElementById('error-msg');
    const btnLogin = document.getElementById('btn-login');

    let isComposing = false;
    usernameInput.addEventListener('compositionstart', () => { isComposing = true; });
    usernameInput.addEventListener('compositionend', () => { isComposing = false; });
    passwordInput.addEventListener('compositionstart', () => { isComposing = true; });
    passwordInput.addEventListener('compositionend', () => { isComposing = false; });

    passwordInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !isComposing) handleLogin();
    });
    usernameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !isComposing) passwordInput.focus();
    });

    async function handleLogin() {
      const username = usernameInput.value.trim();
      const password = passwordInput.value;

      if (!username || !password) {
        errorMsg.textContent = '请输入用户名和密码';
        return;
      }

      btnLogin.disabled = true;
      btnLogin.textContent = '登录中...';
      errorMsg.textContent = '';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        if (res.ok) {
          const data = await res.json();
          document.cookie = `auth_token=${data.token}; path=/; max-age=86400; SameSite=Lax`;
          if (data.must_change_password) {
            window.location.href = '/?must_change_password=1';
          } else {
            window.location.href = '/';
          }
        } else {
          const data = await res.json();
          errorMsg.textContent = data.detail || '登录失败';
        }
      } catch (e) {
        errorMsg.textContent = '网络错误，请重试';
      } finally {
        btnLogin.disabled = false;
        btnLogin.textContent = '登 录';
      }
    }
  </script>
</body>
</html>
